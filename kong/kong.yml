_format_version: "3.0"
_transform: true

services:
  - name: api-graphql
    url: http://api:4000/
    routes:
      - name: graphql-route
        paths:
          - /graphql
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
      exposed_headers:
        - X-Auth-Token
        - Authorization
      credentials: true
      max_age: 3600
