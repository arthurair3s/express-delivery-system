type Pedido {
  id: ID!
  usuario: Usuario
  restaurante_id: ID
  status: String
  valor_total: Float
  destino_latitude: Float
  destino_longitude: Float
  data_criacao: String
}

extend type Usuario {
  pedidos: [Pedido]
}

extend type Query {
  pedidos: [Pedido]
  pedido(id: ID!): Pedido
}

extend type Mutation {
  criarPedido(
    usuario_id: ID!
    restaurante_id: ID!
    status: String
    valor_total: Float
    destino_latitude: Float!
    destino_longitude: Float!
    data_criacao: String
  ): Pedido

  editarPedido(
    id: ID!
    usuario_id: ID
    restaurante_id: ID
    status: String
    valor_total: Float
    destino_latitude: Float
    destino_longitude: Float
    data_criacao: String
  ): Pedido

  deletarPedido(id: ID!): Boolean
}
