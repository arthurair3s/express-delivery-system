<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Visualizador de Rotas (Modo Query)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ... Seus estilos anteriores ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 14px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1rem; font-weight: 600; color: #f8fafc; }
    #map { flex: 1; z-index: 1; }
    
    /* Painel Lateral Ajustado para o Input */
    #panel { 
      position: absolute; top: 70px; right: 16px; z-index: 1000; 
      background: #1e293b; border: 1px solid #334155; border-radius: 12px; 
      padding: 16px; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
      display: flex; flex-direction: column; gap: 10px;
    }
    
    #queryInput {
      width: 100%; height: 180px; background: #0f172a; border: 1px solid #475569;
      border-radius: 6px; color: #38bdf8; font-family: 'Courier New', monospace;
      font-size: 11px; padding: 8px; resize: vertical;
    }

    .stat { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 4px 0; }
    .stat-label { font-size: 0.75rem; color: #94a3b8; }
    .stat-value { font-size: 0.9rem; font-weight: 600; color: #38bdf8; }
    
    #btn { 
      width: 100%; padding: 10px; background: #3b82f6; border: none; 
      border-radius: 8px; color: white; font-weight: 600; cursor: pointer;
    }
    #btn:hover { background: #2563eb; }
    .marker-label { background: #1e293b; border: 2px solid #38bdf8; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #e2e8f0; }
  </style>
</head>
<body>

<header>
  <h1>🗺️ Debugger de Rotas GraphQL</h1>
</header>

<div id="panel">
  <label style="font-size: 0.7rem; color: #94a3b8;">COLE SUA QUERY ABAIXO:</label>
  <textarea id="queryInput">
query {
  calcularRotaMultiplosPontos(pontos: [
    { latitude: -22.881332, longitude: -43.260131 },
    { latitude: -22.876992, longitude: -43.256714 },
    { latitude: -22.879270, longitude: -43.254337 }
  ]) {
    distancia_total_km
    duracao_total_segundos
    caminho { latitude longitude }
  }
}</textarea>

  <button id="btn" onclick="carregarRota()">🚀 Executar Query</button>

  <div style="margin-top: 10px;">
    <div class="stat"><span class="stat-label">Distância:</span><span id="distancia" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Duração:</span><span id="duracao" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Pontos:</span><span id="pontos" class="stat-value">—</span></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map', {
    maxZoom: 20 
  }).setView([-22.879, -43.258], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let rotaLayer = null;
  let marcadoresLayer = L.layerGroup().addTo(map);

  async function carregarRota() {
    const btn = document.getElementById('btn');
    const queryValue = document.getElementById('queryInput').value; 
    
    btn.disabled = true;
    btn.textContent = '⏳ Processando...';

    try {
      const res = await fetch('http://localhost:4000/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: queryValue })
      });

      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);

      const rota = json.data.calcularRotaMultiplosPontos;

      // Limpa camadas anteriores
      if (rotaLayer) map.removeLayer(rotaLayer);
      marcadoresLayer.clearLayers();

      const latlngs = rota.caminho.map(p => [p.latitude, p.longitude]);

      // 1. Linha do trajeto (mais fina e suave para servir de base)
      rotaLayer = L.polyline(latlngs, { 
        color: '#38bdf8', 
        weight: 3, 
        opacity: 0.3 
      }).addTo(map);

      // 2. Pontos discretos do trajeto (as "bolinhas" do caminho)
      rota.caminho.forEach((p) => {
        L.circleMarker([p.latitude, p.longitude], {
          radius: 1.2,        // Bem pequena e discreta
          stroke: false,
          fillColor: '#38bdf8',
          fillOpacity: 0.7,
          interactive: false  // Para não atrapalhar o clique nos pontos principais
        }).addTo(marcadoresLayer);
      });

      // 3. Marcadores Principais (Origem, Paradas, Destino) extraídos da Query
      const regex = /latitude:\s*(-?\d+\.\d+),\s*longitude:\s*(-?\d+\.\d+)/g;
      let match;
      let i = 0;
      const coresDestaque = ['#22c55e', '#f59e0b', '#ef4444']; // Verde, Laranja, Vermelho

      while ((match = regex.exec(queryValue)) !== null) {
        const lat = parseFloat(match[1]);
        const lng = parseFloat(match[2]);
        
        // Círculo de destaque (maior e visível)
        L.circleMarker([lat, lng], {
          radius: 8,
          weight: 2,
          color: '#ffffff',
          fillColor: coresDestaque[i] || '#3b82f6',
          fillOpacity: 1,
          pane: 'markerPane' // Garante que fiquem acima das bolinhas pequenas
        }).addTo(marcadoresLayer)
          .bindPopup(`<b>Ponto ${i + 1}</b><br>${lat}, ${lng}`);
        
        i++;
      }

      map.fitBounds(rotaLayer.getBounds(), { padding: [50, 50], maxZoom: 18 });

      // Atualiza interface
      document.getElementById('distancia').textContent = `${rota.distancia_total_km.toFixed(2)} km`;
      document.getElementById('duracao').textContent = `${Math.round(rota.duracao_total_segundos / 60)} min`;
      document.getElementById('pontos').textContent = rota.caminho.length;

    } catch (e) {
      alert('Erro: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 Executar Query';
    }
  }

  carregarRota();
</script>

</body>
</html>
