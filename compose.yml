services:
  db:
    image: postgres:15-alpine
    container_name: db_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ifood_clone
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: db_redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    networks:
      - app-network

  ms-entregadores:
    build:
      context: .
      dockerfile: ms-entregadores-cs/Dockerfile
    container_name: ms_entregadores
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: Host=db;Database=ifood_clone;Username=postgres;Password=postgres
      ConnectionStrings__RedisConnection: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '5001:5001'
    restart: unless-stopped
    networks:
      - app-network

  ms-roteamento:
    build:
      context: .
      dockerfile: ms-roteamento-cs/Dockerfile
    container_name: ms_roteamento
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5002
      OSRM_URL: http://172.20.0.10:5000/
    depends_on:
      osrm-server:
        condition: service_started
    ports:
      - '5002:5002'
    restart: unless-stopped
    networks:
      - app-network

  osrm-server:
    image: osrm/osrm-backend
    container_name: osrm_server
    ports:
      - '5080:5000'
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/sudeste-260326.osrm
    restart: unless-stopped
    networks:
      app-network:
        ipv4_address: 172.20.0.10

  api:
    build:
      context: ./api-node
      dockerfile: Dockerfile
    container_name: api_delivery
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ifood_clone?schema=public
      ENTREGADORES_SERVICE_URL: ms_entregadores:5001
      ROTEAMENTO_SERVICE_URL: ms_roteamento:5002
    depends_on:
      db:
        condition: service_healthy
      ms-entregadores:
        condition: service_started
      ms-roteamento:
        condition: service_started
    volumes:
      - ./api-node:/app
      - /app/node_modules
      - ./protos:/app/protos
    command: sh -c "npx prisma db push --force-reset && npx prisma db seed && npm run dev"
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: frontend_web
    ports:
      - '5173:5173'
    depends_on:
      - api
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
