type Avaliacao {
  id: ID!
  usuario: Usuario!
  restaurante: Restaurante!
  nota: Int!
  comentario: String
}

extend type Usuario {
  avaliacoes: [Avaliacao]
}

extend type Restaurante {
  avaliacoes: [Avaliacao]
}

extend type Query {
  avaliacoes: [Avaliacao]
  avaliacao(id: ID!): Avaliacao
}

extend type Mutation {
  criarAvaliacao(
    usuario_id: ID!
    restaurante_id: ID!
    nota: Int!
    comentario: String
  ): Avaliacao

  editarAvaliacao(
    id: ID!
    usuario_id: ID
    restaurante_id: ID
    nota: Int
    comentario: String
  ): Avaliacao

  deletarAvaliacao(id: ID!): Boolean
}
