type Categoria {
  id: ID!
  nome: String!
  restaurante: Restaurante
}

extend type Restaurante {
  categorias: [Categoria]
}

extend type Query {
  categorias: [Categoria]
  categoria(id: ID!): Categoria
}

extend type Mutation {
  criarCategoria(
    nome: String!
    restaurante_id: ID!
  ): Categoria

  editarCategoria(
    id: ID!
    nome: String
    restaurante_id: ID
  ): Categoria

  deletarCategoria(id: ID!): Boolean
}
